version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mapic-postgres
    environment:
      POSTGRES_DB: mapic
      POSTGRES_USER: mapic
      POSTGRES_PASSWORD: mapic123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapic"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: mapic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
  postgres_data:
