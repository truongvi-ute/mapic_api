# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Database Configuration - PostgreSQL
# Local: uses these settings
# Render: uses DATABASE_URL environment variable (handled by RenderDatabaseConfig)
spring.datasource.url=jdbc:postgresql://localhost:5432/mapic_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT Configuration
# Hướng dẫn: jwt.secret phải dài ít nhất 256-bit (khoảng 32 ký tự)
jwt.secret=mapic-secret-key-for-jwt-token-generation-minimum-256-bits-long-secure-key
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Mail Configuration - Brevo (Sendinblue) SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME:your_brevo_smtp_login}
spring.mail.password=${BREVO_SMTP_PASSWORD:your_brevo_smtp_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender configuration
mail.from.email=${MAIL_FROM_EMAIL:your_email@example.com}
mail.from.name=MAPIC Team

# Logging
logging.level.com.mapic.backend=DEBUG

# OpenCage Geocoding API
opencage.api.key=${OPENCAGE_API_KEY:your_opencage_api_key}
